name: Installer

on:
  push:
    tags: ["installer/v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 设置 Go 环境
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: installer/go.sum

      - name: 交叉编译
        working-directory: installer
        run: |
          VERSION=${GITHUB_REF#refs/tags/installer/v}
          mkdir -p dist

          build() {
            local goos=$1 goarch=$2 ext=$3
            echo "构建 ${goos}/${goarch}..."
            CGO_ENABLED=0 GOOS=$goos GOARCH=$goarch go build \
              -ldflags="-s -w -X 'main.version=${VERSION}' -X 'main.buildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)'" \
              -o dist/flecb_${goos}_${goarch}${ext} ./cmd/flecb/
          }

          build linux amd64 ""
          build linux arm64 ""

          cd dist
          sha256sum flecb_* > checksums.txt

      - name: 生成 Changelog
        id: changelog
        run: |
          VERSION=${GITHUB_REF#refs/tags/installer/v}

          cat > release_notes.md << EOF
          ## FlecBlog Installer v${VERSION}

          一键部署 FlecBlog 的命令行工具。
          EOF

          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "Installer v${{ steps.changelog.outputs.version }}"
          body_path: release_notes.md
          draft: false
          prerelease: false
          generate_release_notes: false
          files: |
            installer/dist/flecb_*
            installer/dist/checksums.txt

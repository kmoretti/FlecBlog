name: Build Docker Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（留空自动生成，示例: 1.3.7）'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

permissions:
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [admin, blog, server]
        include:
          - target: admin
            image_name: flec-admin
            context: ./admin
          - target: blog
            image_name: flec-blog
            context: ./blog/default
          - target: server
            image_name: flec-server
            context: ./server

    steps:
      - uses: actions/checkout@v4

      - name: 设置版本号
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "version=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT
          fi

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 生成镜像标签
        id: meta
        run: |
          LOWERCASE_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "registry=ghcr.io/${LOWERCASE_REPO}" >> $GITHUB_OUTPUT

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          provenance: false
          tags: |
            ${{ steps.meta.outputs.registry }}/${{ matrix.image_name }}:${{ steps.version.outputs.version }}
            ${{ steps.meta.outputs.registry }}/${{ matrix.image_name }}:latest
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            PANEL_API_KEY=${{ secrets.PANEL_API_KEY }}

      - name: 输出推送结果
        run: |
          echo "✅ 已推送 ghcr.io/${{ github.repository }}/${{ matrix.image_name }}:${{ steps.version.outputs.version }}"

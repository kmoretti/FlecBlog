name = "flec-panel"
main = "src/app.ts"
compatibility_date = "2024-05-01"

[assets]
directory = "public"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "flec-panel-d1"
database_id = "b39b8f3d-1734-498a-a3aa-ad05b1356ea7"

[triggers]
crons = ["0 * * * *"]

[[routes]]
pattern = "panel.flec.top"
zone_name = "flec.top"
custom_domain = true

[observability]
enabled = true

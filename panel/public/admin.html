<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlecPanel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
    }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 220px;
      background: #fff;
      border-right: 1px solid #e8e8e8;
      padding: 20px 0;
      position: fixed;
      height: 100vh;
    }

    .sidebar-header {
      padding: 0 20px 20px;
      border-bottom: 1px solid #f0f0f0;
      margin-bottom: 12px;
    }

    .sidebar-header h1 {
      font-size: 18px;
      font-weight: 600;
    }

    .nav-item {
      padding: 10px 20px;
      color: #666;
      cursor: pointer;
      transition: all 0.2s;
    }

    .nav-item:hover {
      background: #f5f5f5;
      color: #333;
    }

    .nav-item.active {
      background: #e6f4ff;
      color: #1890ff;
    }

    .main {
      flex: 1;
      margin-left: 220px;
    }

    .header {
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h2 {
      font-size: 16px;
      font-weight: 600;
    }

    .content {
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #e8e8e8;
    }

    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-header h3 {
      font-size: 15px;
      font-weight: 600;
    }

    .card-body {
      padding: 20px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-item {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 20px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .stat-label {
      color: #999;
      font-size: 13px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid #f0f0f0;
    }

    th {
      font-weight: 500;
      color: #999;
      font-size: 13px;
    }

    tr:hover td {
      background: #fafafa;
    }

    .btn {
      padding: 8px 16px;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .btn:hover {
      border-color: #1890ff;
      color: #1890ff;
    }

    .btn-primary {
      background: #1890ff;
      border-color: #1890ff;
      color: #fff;
    }

    .btn-primary:hover {
      background: #40a9ff;
      border-color: #40a9ff;
      color: #fff;
    }

    .btn-danger {
      color: #ff4d4f;
      border-color: #ff4d4f;
    }

    .btn-danger:hover {
      background: #ff4d4f;
      color: #fff;
    }

    .btn-sm {
      padding: 4px 12px;
      font-size: 13px;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
    }

    .badge-success { background: #f6ffed; color: #52c41a; }
    .badge-default { background: #fafafa; color: #999; }
    .badge-info { background: #e6f7ff; color: #1890ff; }

    .form-item {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #333;
    }

    .form-input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      font-size: 14px;
    }

    .form-input:focus {
      outline: none;
      border-color: #1890ff;
    }

    .form-hint {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }

    .modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal {
      background: #fff;
      border-radius: 8px;
      width: 100%;
      max-width: 440px;
    }

    .modal-head {
      padding: 16px 20px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-head h3 {
      font-size: 15px;
      font-weight: 600;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 20px;
      color: #999;
      cursor: pointer;
      line-height: 1;
    }

    .modal-close:hover {
      color: #333;
    }

    .modal-body {
      padding: 20px;
    }

    .modal-foot {
      padding: 12px 20px;
      border-top: 1px solid #f0f0f0;
      text-align: right;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: #333;
      color: #fff;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      transition: transform 0.3s;
      z-index: 200;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .empty {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .hidden { display: none !important; }

    .loading {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
    }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; }
      .stats { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <!-- Loading -->
  <div id="loadingPage" class="loading">
    <div>加载中...</div>
  </div>

  <!-- Admin -->
  <div id="adminPage" class="layout hidden">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>FlecPanel</h1>
      </div>
      <nav>
        <div class="nav-item active" onclick="showPage('dashboard')">仪表盘</div>
        <div class="nav-item" onclick="showPage('versions')">版本管理</div>
        <div class="nav-item" onclick="showPage('announcements')">公告管理</div>
        <div class="nav-item" onclick="showPage('providers')">AI 服务</div>
        <div class="nav-item" onclick="showPage('registrations')">部署管理</div>
        <div class="nav-item" onclick="showPage('settings')">系统设置</div>
      </nav>
    </aside>

    <main class="main">
      <header class="header">
        <h2 id="pageTitle">仪表盘</h2>
      </header>

      <div class="content">
        <!-- Dashboard -->
        <div id="dashboardPage">
          <div class="stats">
            <div class="stat-item">
              <div class="stat-value" id="statVersions">-</div>
              <div class="stat-label">版本总数</div>
            </div>
            <div class="stat-item">
              <div class="stat-value" id="statEnabled">-</div>
              <div class="stat-label">已推送</div>
            </div>
            <div class="stat-item">
              <div class="stat-value" id="statAnnouncements">-</div>
              <div class="stat-label">公告</div>
            </div>
            <div class="stat-item">
              <div class="stat-value" id="statRegistrations">-</div>
              <div class="stat-label">部署总数</div>
            </div>
          </div>
          <div class="card" style="margin-bottom: 24px;">
            <div class="card-header">
              <h3>最新版本</h3>
              <button class="btn btn-sm" onclick="showPage('versions')">查看全部</button>
            </div>
            <table>
              <thead><tr><th>版本</th><th>日期</th><th>状态</th></tr></thead>
              <tbody id="dashboardVersionList"></tbody>
            </table>
          </div>
          <div class="card">
            <div class="card-header">
              <h3>最新公告</h3>
              <button class="btn btn-sm" onclick="showPage('announcements')">查看全部</button>
            </div>
            <table>
              <thead><tr><th>标题</th><th>内容</th><th>时间</th></tr></thead>
              <tbody id="dashboardAnnouncementList"></tbody>
            </table>
          </div>
        </div>

        <!-- Versions -->
        <div id="versionsPage" class="hidden">
          <div style="margin-bottom: 16px;">
            <button class="btn" onclick="syncGitHub()">同步 GitHub</button>
          </div>
          <div class="card">
            <table>
              <thead><tr><th>版本</th><th>日期</th><th>状态</th><th>操作</th></tr></thead>
              <tbody id="versionList"></tbody>
            </table>
          </div>
        </div>

        <!-- Announcements -->
        <div id="announcementsPage" class="hidden">
          <div style="margin-bottom: 16px;">
            <button class="btn btn-primary" onclick="openModal('annModal')">发布公告</button>
          </div>
          <div class="card">
            <table>
              <thead><tr><th>标题</th><th>内容</th><th>链接</th><th>时间</th><th>操作</th></tr></thead>
              <tbody id="annList"></tbody>
            </table>
          </div>
        </div>

        <!-- Settings -->
        <div id="settingsPage" class="hidden">
          <div class="card" style="max-width: 500px;">
            <div class="card-header"><h3>系统设置</h3></div>
            <div class="card-body">
              <div class="form-item">
                <label class="form-label">GitHub 仓库</label>
                <input type="text" id="settingGithubRepo" class="form-input" placeholder="owner/repo" autocomplete="off">
                <div class="form-hint">每小时自动同步 Release</div>
              </div>
              <div class="form-item">
                <label class="form-label">GitHub Token</label>
                <input type="password" id="settingGithubToken" class="form-input" placeholder="ghp_xxxx" autocomplete="off">
                <div class="form-hint">可选，用于提高 API 速率限制</div>
              </div>
              <button class="btn btn-primary" onclick="saveSettings()">保存</button>
            </div>
          </div>
        </div>

        <!-- AI Providers -->
        <div id="providersPage" class="hidden">
          <div style="margin-bottom: 16px;">
            <button class="btn btn-primary" onclick="openProviderModal()">添加提供商</button>
          </div>
          <div class="card">
            <table>
              <thead><tr><th>名称</th><th>模型</th><th>即时优先</th><th>非即时优先</th><th>调用/失败</th><th>操作</th></tr></thead>
              <tbody id="providerList"></tbody>
            </table>
          </div>
        </div>

        <!-- Registrations -->
        <div id="registrationsPage" class="hidden">
          <div class="card">
            <table>
              <thead><tr><th>client_key</th><th>当前站点</th><th>版本</th><th>首次上线</th><th>最后活跃</th><th>历史域名</th><th>今日调用</th><th>备注</th><th>操作</th></tr></thead>
              <tbody id="registrationList"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Version Edit Modal -->
  <div id="versionEditModal" class="modal-mask hidden">
    <div class="modal">
      <div class="modal-head">
        <h3>编辑版本</h3>
        <button class="modal-close" onclick="closeModal('versionEditModal')">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editVersionName">
        <div class="form-item">
          <label class="form-label">版本号</label>
          <input type="text" id="editVersionDisplay" class="form-input" disabled style="background: #f5f5f5;">
        </div>
        <div class="form-item">
          <label class="form-label">发布日期</label>
          <input type="date" id="editVersionDate" class="form-input">
        </div>
        <div class="form-item">
          <label class="form-label">更新内容</label>
          <textarea id="editVersionChanges" class="form-input" style="min-height: 150px; resize: vertical;"></textarea>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn" onclick="closeModal('versionEditModal')">取消</button>
        <button class="btn btn-primary" onclick="updateVersionFromModal()">保存</button>
      </div>
    </div>
  </div>

  <!-- Announcement Modal -->
  <div id="annModal" class="modal-mask hidden">
    <div class="modal">
      <div class="modal-head">
        <h3>发布公告</h3>
        <button class="modal-close" onclick="closeModal('annModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-item">
          <label class="form-label">标题</label>
          <input type="text" id="annTitle" class="form-input">
        </div>
        <div class="form-item">
          <label class="form-label">内容</label>
          <textarea id="annContent" class="form-input" style="min-height: 100px; resize: vertical;"></textarea>
        </div>
        <div class="form-item">
          <label class="form-label">链接（可选）</label>
          <input type="text" id="annLink" class="form-input" placeholder="https://...">
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn" onclick="closeModal('annModal')">取消</button>
        <button class="btn btn-primary" onclick="saveAnnouncement()">发布</button>
      </div>
    </div>
  </div>

  <!-- AI Provider Modal -->
  <div id="providerModal" class="modal-mask hidden">
    <div class="modal">
      <div class="modal-head">
        <h3 id="providerModalTitle">添加提供商</h3>
        <button class="modal-close" onclick="closeModal('providerModal')">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editProviderId">
        <div class="form-item">
          <label class="form-label">名称</label>
          <input type="text" id="providerName" class="form-input" placeholder="如：我的 OpenAI">
        </div>
        <div class="form-item">
          <label class="form-label">接口地址</label>
          <input type="text" id="providerBaseUrl" class="form-input" placeholder="https://api.openai.com/v1">
        </div>
        <div class="form-item">
          <label class="form-label">密钥</label>
          <input type="password" id="providerApiKey" class="form-input" placeholder="sk-xxxx">
        </div>
        <div class="form-item">
          <label class="form-label">模型</label>
          <input type="text" id="providerModel" class="form-input" placeholder="gpt-4o-mini">
        </div>
        <div class="form-item" style="display:flex;gap:12px;">
          <div style="flex:1;">
            <label class="form-label">即时优先级</label>
            <input type="number" id="providerPriorityImmediate" class="form-input" value="999" min="0">
            <div class="form-hint">越小越优先</div>
          </div>
          <div style="flex:1;">
            <label class="form-label">非即时优先级</label>
            <input type="number" id="providerPriorityDeferred" class="form-input" value="999" min="0">
            <div class="form-hint">越小越优先</div>
          </div>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn" onclick="closeModal('providerModal')">取消</button>
        <button class="btn btn-primary" onclick="saveProvider()">保存</button>
      </div>
    </div>
  </div>

  <!-- Registration Detail Modal -->
  <div id="regDetailModal" class="modal-mask hidden">
    <div class="modal" style="max-width: 600px;">
      <div class="modal-head">
        <h3>部署详情</h3>
        <button class="modal-close" onclick="closeModal('regDetailModal')">&times;</button>
      </div>
      <div class="modal-body" id="regDetailBody"></div>
    </div>
  </div>

  <!-- Registration Edit Modal -->
  <div id="regEditModal" class="modal-mask hidden">
    <div class="modal">
      <div class="modal-head">
        <h3>编辑部署</h3>
        <button class="modal-close" onclick="closeModal('regEditModal')">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editRegId">
        <div class="form-item">
          <label class="form-label">状态</label>
          <select id="editRegBanned" class="form-input">
            <option value="0">正常</option>
            <option value="1">封禁</option>
            <option value="2">已解封</option>
          </select>
        </div>
        <div class="form-item">
          <label class="form-label">备注</label>
          <textarea id="editRegRemark" class="form-input" style="min-height: 80px; resize: vertical;"></textarea>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn" onclick="closeModal('regEditModal')">取消</button>
        <button class="btn btn-primary" onclick="saveRegistration()">保存</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script>
    /**
     * 打开模态框
     */
    function openModal(id) {
      document.getElementById(id).classList.remove('hidden');
    }

    /**
     * 关闭模态框
     */
    function closeModal(id) {
      document.getElementById(id).classList.add('hidden');
    }

    /**
     * 显示提示消息
     */
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    /**
     * 切换页面
     */
    function showPage(page) {
      document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
      event.target.classList.add('active');

      const pages = ['dashboard', 'versions', 'announcements', 'settings', 'providers', 'registrations'];
      const titles = { dashboard: '仪表盘', versions: '版本管理', announcements: '公告管理', settings: '系统设置', providers: 'AI 服务', registrations: '部署管理' };

      pages.forEach(p => document.getElementById(p + 'Page').classList.toggle('hidden', p !== page));
      document.getElementById('pageTitle').textContent = titles[page];

      if (page === 'versions') loadVersions();
      if (page === 'announcements') loadAnnouncements();
      if (page === 'settings') loadSettings();
      if (page === 'providers') loadProviders();
      if (page === 'dashboard') loadDashboard();
      if (page === 'registrations') loadRegistrations();
    }

    /**
     * 加载仪表盘数据
     */
    async function loadDashboard() {
      try {
        const [vRes, aRes, rRes] = await Promise.all([
          fetch('/admin/versions?all=true'),
          fetch('/admin/announcements'),
          fetch('/admin/registrations')
        ]);

        const versions = (await vRes.json()).versions || [];
        const announcements = (await aRes.json()).announcements || [];
        const registrations = await rRes.json();

        const regCount = Array.isArray(registrations) ? registrations.length : 0;
        document.getElementById('statVersions').textContent = versions.length;
        document.getElementById('statEnabled').textContent = versions.filter(v => v.enabled).length;
        document.getElementById('statAnnouncements').textContent = announcements.length;
        document.getElementById('statRegistrations').textContent = regCount;

        const tbody = document.getElementById('dashboardVersionList');
        tbody.innerHTML = versions.slice(0, 5).map(v =>
          '<tr><td><code style="background:#f5f5f5;padding:2px 6px;border-radius:3px;">' + v.version + '</code></td><td>' + v.date + '</td><td><span class="badge ' + (v.enabled ? 'badge-success' : 'badge-default') + '">' + (v.enabled ? '已推送' : '未推送') + '</span></td></tr>'
        ).join('') || '<tr><td colspan="3" class="empty">暂无数据</td></tr>';

        const annTbody = document.getElementById('dashboardAnnouncementList');
        annTbody.innerHTML = announcements.slice(0, 3).map(a =>
          '<tr><td>' + escapeHtml(a.title) + '</td><td>' + escapeHtml(a.content) + '</td><td>' + a.created_at + '</td></tr>'
        ).join('') || '<tr><td colspan="3" class="empty">暂无公告</td></tr>';
      } catch (e) {
        console.error('Load dashboard failed:', e);
        document.getElementById('statVersions').textContent = '-';
        document.getElementById('statEnabled').textContent = '-';
        document.getElementById('statAnnouncements').textContent = '-';
        document.getElementById('statRegistrations').textContent = '-';
        document.getElementById('dashboardVersionList').innerHTML = '<tr><td colspan="3" class="empty">加载失败</td></tr>';
        document.getElementById('dashboardAnnouncementList').innerHTML = '<tr><td colspan="3" class="empty">加载失败</td></tr>';
      }
    }

    /**
     * 加载版本列表
     */
    async function loadVersions() {
      const res = await fetch('/admin/versions?all=true');
      const data = await res.json();
      const tbody = document.getElementById('versionList');

      if (!data.versions.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty">暂无版本</td></tr>';
        return;
      }

      tbody.innerHTML = data.versions.map(v => {
        const changesStr = typeof v.changes === 'string' ? v.changes : JSON.stringify(v.changes || {});
        return '<tr>' +
          '<td><code style="background:#f5f5f5;padding:2px 6px;border-radius:3px;">' + v.version + '</code></td>' +
          '<td>' + v.date + '</td>' +
          '<td><span class="badge ' + (v.enabled ? 'badge-success' : 'badge-default') + '">' + (v.enabled ? '已推送' : '未推送') + '</span></td>' +
          '<td>' +
            '<button class="btn btn-sm" data-version="' + escapeHtml(v.version) + '" data-date="' + v.date + '" data-changes="' + escapeHtml(changesStr) + '" onclick="openEditVersionModal(this)">编辑</button> ' +
            '<button class="btn btn-sm ' + (v.enabled ? '' : 'btn-primary') + '" onclick="toggleVersion(\'' + encodeURIComponent(v.version) + '\', ' + !v.enabled + ')">' + (v.enabled ? '取消推送' : '推送') + '</button> ' +
            '<button class="btn btn-sm btn-danger" onclick="deleteVersion(\'' + encodeURIComponent(v.version) + '\')">删除</button>' +
          '</td>' +
        '</tr>';
      }).join('');
    }

    /**
     * 切换版本启用状态
     */
    async function toggleVersion(version, enabled) {
      const res = await fetch('/admin/versions/' + version, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ enabled })
      });
      const data = await res.json();
      if (data.success) {
        loadVersions();
        showToast(enabled ? '已推送' : '已取消推送');
      }
    }

    /**
     * 删除版本
     */
    async function deleteVersion(version) {
      if (!confirm('确定删除 ' + decodeURIComponent(version) + '?')) return;
      const res = await fetch('/admin/versions/' + version, { method: 'DELETE' });
      const data = await res.json();
      if (data.success) {
        loadVersions();
        showToast('已删除');
      }
    }

    /**
     * 打开版本编辑模态框
     */
    function openEditVersionModal(btn) {
      document.getElementById('editVersionName').value = btn.dataset.version;
      document.getElementById('editVersionDisplay').value = btn.dataset.version;
      document.getElementById('editVersionDate').value = btn.dataset.date;
      document.getElementById('editVersionChanges').value = btn.dataset.changes || '';
      openModal('versionEditModal');
    }

    /**
     * 从模态框更新版本
     */
    async function updateVersionFromModal() {
      const version = document.getElementById('editVersionName').value;
      const res = await fetch('/admin/versions/' + encodeURIComponent(version), {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          date: document.getElementById('editVersionDate').value,
          changes: document.getElementById('editVersionChanges').value
        })
      });
      const data = await res.json();
      if (data.success) {
        closeModal('versionEditModal');
        loadVersions();
        showToast('已更新');
      } else {
        showToast(data.error || '更新失败');
      }
    }

    /**
     * 加载公告列表
     */
    async function loadAnnouncements() {
      const res = await fetch('/admin/announcements');
      const data = await res.json();
      const tbody = document.getElementById('annList');

      if (!data.announcements.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty">暂无公告</td></tr>';
        return;
      }

      tbody.innerHTML = data.announcements.map(a => {
        return '<tr>' +
          '<td>' + escapeHtml(a.title) + '</td>' +
          '<td>' + escapeHtml(a.content) + '</td>' +
          '<td>' + escapeHtml(a.link || '-') + '</td>' +
          '<td>' + a.created_at + '</td>' +
          '<td>' +
            '<button class="btn btn-sm btn-danger" onclick="deleteAnnouncement(' + a.id + ')">删除</button>' +
          '</td>' +
        '</tr>';
      }).join('');
    }

    /**
     * HTML 转义
     */
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    /**
     * 保存公告
     */
    async function saveAnnouncement() {
      const body = {
        title: document.getElementById('annTitle').value,
        content: document.getElementById('annContent').value,
        link: document.getElementById('annLink').value || undefined
      };
      if (!body.title || !body.content) {
        showToast('请填写标题和内容');
        return;
      }

      const res = await fetch('/admin/announcements', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (data.success) {
        closeModal('annModal');
        document.getElementById('annTitle').value = '';
        document.getElementById('annContent').value = '';
        document.getElementById('annLink').value = '';
        loadAnnouncements();
        showToast('发布成功');
      } else {
        showToast(data.error || '发布失败');
      }
    }

    /**
     * 删除公告
     */
    async function deleteAnnouncement(id) {
      if (!confirm('确定删除?')) return;
      const res = await fetch('/admin/announcements/' + id, { method: 'DELETE' });
      const data = await res.json();
      if (data.success) {
        loadAnnouncements();
        showToast('已删除');
      }
    }

    /**
     * 加载系统设置
     */
    async function loadSettings() {
      const res = await fetch('/admin/settings');
      const data = await res.json();
      if (data.settings) {
        document.getElementById('settingGithubRepo').value = data.settings.github_repo || '';
        document.getElementById('settingGithubToken').value = data.settings.github_token || '';
      }
    }

    /**
     * 保存系统设置
     */
    async function saveSettings() {
      const res = await fetch('/admin/settings', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          github_repo: document.getElementById('settingGithubRepo').value || undefined,
          github_token: document.getElementById('settingGithubToken').value || undefined
        })
      });
      const data = await res.json();
      if (data.success) {
        showToast('已保存');
      } else {
        showToast(data.error || '保存失败');
      }
    }

    /**
     * 同步 GitHub Releases
     */
    async function syncGitHub() {
      const btn = event.target;
      btn.disabled = true;
      btn.textContent = '同步中...';
      const res = await fetch('/admin/versions/sync', { method: 'POST' });
      const data = await res.json();
      btn.disabled = false;
      btn.textContent = '同步 GitHub';
      if (data.success) {
        loadVersions();
        showToast('同步成功');
      } else {
        showToast(data.error || '同步失败');
      }
    }

    /**
     * 加载 AI 提供商列表
     */
    async function loadProviders() {
      const res = await fetch('/admin/ai/providers');
      const data = await res.json();
      const tbody = document.getElementById('providerList');

      if (!data.providers || !data.providers.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty">暂无提供商，点击上方"添加提供商"开始</td></tr>';
        return;
      }

      tbody.innerHTML = data.providers.map(p => {
        return '<tr>' +
          '<td>' + escapeHtml(p.name) + '</td>' +
          '<td><code style="background:#f5f5f5;padding:2px 6px;border-radius:3px;">' + escapeHtml(p.model) + '</code></td>' +
          '<td>' + p.priority_immediate + '</td>' +
          '<td>' + p.priority_deferred + '</td>' +
          '<td>' + p.call_count + ' / ' + p.fail_count + '</td>' +
          '<td>' +
            '<button class="btn btn-sm" onclick="editProvider(' + p.id + ')">编辑</button> ' +
            '<button class="btn btn-sm btn-danger" onclick="deleteProvider(' + p.id + ')">删除</button>' +
          '</td>' +
        '</tr>';
      }).join('');
    }

    /**
     * 打开添加提供商模态框
     */
    function openProviderModal() {
      document.getElementById('providerModalTitle').textContent = '添加提供商';
      document.getElementById('editProviderId').value = '';
      document.getElementById('providerName').value = '';
      document.getElementById('providerBaseUrl').value = '';
      document.getElementById('providerApiKey').value = '';
      document.getElementById('providerModel').value = '';
      document.getElementById('providerPriorityImmediate').value = '999';
      document.getElementById('providerPriorityDeferred').value = '999';
      openModal('providerModal');
    }

    /**
     * 编辑提供商
     */
    async function editProvider(id) {
      const res = await fetch('/admin/ai/providers');
      const data = await res.json();
      const p = data.providers.find(x => x.id === id);
      if (!p) { showToast('未找到'); return; }

      document.getElementById('providerModalTitle').textContent = '编辑提供商';
      document.getElementById('editProviderId').value = p.id;
      document.getElementById('providerName').value = p.name;
      document.getElementById('providerBaseUrl').value = p.base_url;
      document.getElementById('providerApiKey').value = p.api_key;
      document.getElementById('providerModel').value = p.model;
      document.getElementById('providerPriorityImmediate').value = p.priority_immediate;
      document.getElementById('providerPriorityDeferred').value = p.priority_deferred;
      openModal('providerModal');
    }

    /**
     * 保存提供商
     */
    async function saveProvider() {
      const id = document.getElementById('editProviderId').value;
      const body = {
        name: document.getElementById('providerName').value,
        base_url: document.getElementById('providerBaseUrl').value,
        api_key: document.getElementById('providerApiKey').value,
        model: document.getElementById('providerModel').value,
        priority_immediate: parseInt(document.getElementById('providerPriorityImmediate').value) || 999,
        priority_deferred: parseInt(document.getElementById('providerPriorityDeferred').value) || 999,
      };

      if (!body.name || !body.base_url || !body.api_key || !body.model) {
        showToast('请填写完整信息');
        return;
      }

      const method = id ? 'PUT' : 'POST';
      const url = id ? '/admin/ai/providers/' + id : '/admin/ai/providers';

      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (data.success) {
        closeModal('providerModal');
        loadProviders();
        showToast(id ? '已更新' : '已添加');
      } else {
        showToast(data.error || '保存失败');
      }
    }

    /**
     * 删除提供商
     */
    async function deleteProvider(id) {
      const res = await fetch('/admin/ai/providers');
      const data = await res.json();
      const p = data.providers.find(x => x.id === id);
      if (!confirm('确定删除 ' + (p ? p.name : '此提供商') + '?')) return;

      const delRes = await fetch('/admin/ai/providers/' + id, { method: 'DELETE' });
      const delData = await delRes.json();
      if (delData.success) {
        loadProviders();
        showToast('已删除');
      } else {
        showToast(delData.error || '删除失败');
      }
    }

    /**
     * 加载部署列表
     */
    async function loadRegistrations() {
      const res = await fetch('/admin/registrations');
      const data = await res.json();
      const tbody = document.getElementById('registrationList');

      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="9" class="empty">暂无部署</td></tr>';
        return;
      }

      const today = new Date().toISOString().slice(0, 10);

      tbody.innerHTML = data.map(r => {
        const history = JSON.parse(r.site_url_history || '[]');
        const callCounts = JSON.parse(r.call_counts || '{}');
        const todayCounts = callCounts[today] || {};
        const todayTotal = (todayCounts.ai || 0) + (todayCounts.versions || 0);

        const banStatus = r.banned === 1 ? '<span style="color:#ff4d4f;">已封禁</span>' : (r.banned === 2 ? '<span style="color:#faad14;">已解封</span>' : '');
        const maskedKey = r.client_key.slice(0, 12) + '...';

        return '<tr>' +
          '<td title="' + escapeHtml(r.client_key) + '" style="font-family:monospace;">' + escapeHtml(maskedKey) + '</td>' +
          '<td>' + escapeHtml(r.site_url) + '</td>' +
          '<td>' + escapeHtml(r.version) + '</td>' +
          '<td>' + r.first_seen_at + '</td>' +
          '<td>' + r.last_seen_at + '</td>' +
          '<td>' + history.length + '</td>' +
          '<td>' + todayTotal + '</td>' +
          '<td>' + escapeHtml(r.remark) + '</td>' +
          '<td>' +
            '<button class="btn btn-sm" onclick="viewRegistration(' + r.id + ')">查看</button> ' +
            '<button class="btn btn-sm" onclick="editRegistration(' + r.id + ')">编辑</button>' +
          '</td>' +
        '</tr>';
      }).join('');
    }

    /**
     * 查看部署详情
     */
    async function viewRegistration(id) {
      const res = await fetch('/admin/registrations/' + id);
      const r = await res.json();

      const history = JSON.parse(r.site_url_history || '[]');
      const callCounts = JSON.parse(r.call_counts || '{}');

      let historyHtml = '';
      if (r.site_url) {
        historyHtml += '<tr><td><strong>' + escapeHtml(r.site_url) + '</strong></td><td>' + r.first_seen_at + '</td><td>至今</td></tr>';
      }
      history.forEach(h => {
        historyHtml += '<tr><td>' + escapeHtml(h.url) + '</td><td>' + h.first_seen + '</td><td>' + h.last_seen + '</td></tr>';
      });

      let callHtml = '';
      let grandTotal = 0;
      const dates = Object.keys(callCounts).sort().reverse();
      dates.forEach(d => {
        const day = callCounts[d];
        const total = (day.ai || 0) + (day.versions || 0);
        grandTotal += total;
        callHtml += '<tr><td>' + d + '</td><td>' + (day.ai || 0) + '</td><td>' + (day.versions || 0) + '</td></tr>';
      });
      if (dates.length > 1) {
        callHtml += '<tr style="font-weight:600;"><td>合计</td><td>-</td><td>-</td></tr>';
      }

      const banLabel = r.banned === 1 ? '已封禁' : (r.banned === 2 ? '已解封' : '正常');
      const banColor = r.banned === 1 ? '#ff4d4f' : (r.banned === 2 ? '#faad14' : '#52c41a');

      const html = '<div style="margin-bottom:20px;">' +
        '<div style="margin-bottom:8px;font-size:13px;color:#999;">client_key</div>' +
        '<div style="font-family:monospace;word-break:break-all;">' + escapeHtml(r.client_key) + '</div>' +
      '</div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;">' +
        '<div><div style="font-size:13px;color:#999;">当前站点</div><div>' + escapeHtml(r.site_url) + '</div></div>' +
        '<div><div style="font-size:13px;color:#999;">版本</div><div>' + escapeHtml(r.version) + '</div></div>' +
        '<div><div style="font-size:13px;color:#999;">首次上线</div><div>' + r.first_seen_at + '</div></div>' +
        '<div><div style="font-size:13px;color:#999;">最后活跃</div><div>' + r.last_seen_at + '</div></div>' +
        '<div><div style="font-size:13px;color:#999;">状态</div><div style="color:' + banColor + ';">' + banLabel + '</div></div>' +
        '<div><div style="font-size:13px;color:#999;">备注</div><div>' + escapeHtml(r.remark || '-') + '</div></div>' +
      '</div>' +
      (history.length > 0 || r.site_url ? '<div style="margin-bottom:20px;">' +
        '<div style="font-weight:600;margin-bottom:8px;">域名更换历史</div>' +
        '<table><thead><tr><th>域名</th><th>首次出现</th><th>最后出现</th></tr></thead>' +
        '<tbody>' + historyHtml + '</tbody></table></div>' : '') +
      '<div>' +
        '<div style="font-weight:600;margin-bottom:8px;">调用次数（逐日）</div>' +
        '<table><thead><tr><th>日期</th><th>/api/ai</th><th>/api/versions</th></tr></thead>' +
        '<tbody>' + (callHtml || '<tr><td colspan="3" class="empty">暂无调用</td></tr>') + '</tbody></table>' +
      '</div>';

      document.getElementById('regDetailBody').innerHTML = html;
      openModal('regDetailModal');
    }

    /**
     * 编辑部署
     */
    async function editRegistration(id) {
      const res = await fetch('/admin/registrations/' + id);
      const r = await res.json();
      document.getElementById('editRegId').value = r.id;
      document.getElementById('editRegBanned').value = String(r.banned);
      document.getElementById('editRegRemark').value = r.remark || '';
      openModal('regEditModal');
    }

    /**
     * 保存部署编辑
     */
    async function saveRegistration() {
      const id = document.getElementById('editRegId').value;
      const body = {
        banned: parseInt(document.getElementById('editRegBanned').value),
        remark: document.getElementById('editRegRemark').value
      };
      const res = await fetch('/admin/registrations/' + id, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (data.status === 'ok') {
        closeModal('regEditModal');
        loadRegistrations();
        showToast('已保存');
      } else {
        showToast(data.error || '保存失败');
      }
    }

    // 初始化
    document.getElementById('loadingPage').classList.add('hidden');
    document.getElementById('adminPage').classList.remove('hidden');
    loadDashboard();
  </script>
</body>
</html>

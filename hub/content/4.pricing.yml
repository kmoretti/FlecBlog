title: 方案
description: 从个人博客到定制需求，总有一款适合你
faq:
  title: 常见问题
  description: 关于 FlecBlog 方案的常见问题解答。
  items:
    - label: 免费版有什么限制？
      content: 免费版包含完整的博客功能，包括文章发布、Markdown 编辑、多端渲染和安全认证等，没有功能限制。专业版和定制版提供额外的高级特性和服务。
    - label: 专业版什么时候发布？
      content: 专业版正在规划中，具体功能和时间安排请关注我们的公告。现在可以提前锁定专业版名额。
    - label: 定制版如何收费？
      content: 定制版根据具体需求评估报价，包括功能开发、主题设计和技术支持等。请通过 GitHub 或其他渠道联系我们，沟通详细需求。
    - label: 可以从免费版升级到专业版吗？
      content: 当然可以！专业版发布后，您可以随时从免费版升级，已有的数据和配置会完整保留。
    - label: 开源协议是什么？
      content: FlecBlog 采用开源协议发布，个人和非商业用途可免费使用。商业用途需要购买定制版获取商业授权。
